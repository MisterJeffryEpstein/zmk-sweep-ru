# Ferris Sweep — nice!nano v2
# Bluetooth + battery reporting

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Battery reporting
CONFIG_ZMK_BATTERY_REPORTING=y

# Mouse keys
CONFIG_ZMK_MOUSE=y

# Combo timings (can tune here)
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=4
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=4
