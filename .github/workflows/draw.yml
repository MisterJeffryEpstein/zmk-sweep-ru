name: Draw Keymap

on:
  push:
    paths:
      - "config/cradio.keymap"
  workflow_dispatch:

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Parse keymap → YAML
        run: |
          keymap parse \
            -c 10 \
            -z config/cradio.keymap \
            > keymap.yaml

      - name: Draw YAML → SVG
        run: |
          keymap draw \
            keymap.yaml \
            > keymap.svg

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update keymap diagram"
          file_pattern: "keymap.yaml keymap.svg"
