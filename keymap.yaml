layout: {zmk_keyboard: cradio}
layers:
  Base:
  - [Q, W, E, R, T, Y, U, I, O, P]
  - [A, S, D, F, G, H, J, K, L, '''']
  - [Z, X, C, V, B, N, M, ',', ., /]
  - - {t: SPACE, h: Nav}
    - {t: LSHFT, h: sticky}
    - {t: LSHFT, h: sticky}
    - {t: SPACE, h: Sym}
  Nav:
  - [Gui+SPACE, Gui+1, Gui+2, Gui+3, Gui+T, PG UP, HOME, UP, END, BSPC]
  - [Gui+L, Gui+LEFT, Gui+UP, Gui+RIGHT, Alt+F4, PG DN, LEFT, DOWN, RIGHT, RET]
  - - {t: LCTRL, h: sticky}
    - {t: LALT, h: sticky}
    - {t: LSHFT, h: sticky}
    - {t: LGUI, h: sticky}
    - Gui+Sft+1
    - Gui+Sft+2
    - Gui+Sft+3
    - TAB
    - ESC
    - DEL
  - - {type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - Fun
  Sym:
  - ['!', '@', '#', $, '%', ^, '&', '*', (, )]
  - ['-', '=', '[', ']', \, '`', ;, ':', '~', '|']
  - [_, +, '{', '}', /, '?', <, '>', '"', '&']
  - - Num
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {type: held}
  Num:
  - [F1, F2, F3, F4, F5, F6, F7, F8, F9, F10]
  - ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0']
  - [F11, F12, '-', '=', ., ',', '*', /, +, '-']
  - - {type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {type: held}
  Fun:
  - - {t: BT, h: '0'}
    - {t: BT, h: '1'}
    - {t: BT, h: '2'}
    - {t: BT, h: '3'}
    - BT CLR
    - MUTE
    - VOL DN
    - VOL UP
    - PP
    - STOP
  - [OUT TOG, '', '', '', '&sys_reset', PREV, NEXT, PSCRN, SLCK, PAUSE BREAK]
  - ['&bootloader', '', '', '', '', '', '', '', '', '&bootloader']
  - - {type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {type: held}
  Mouse:
  - ['', '', '', '', '', '&msc SCRL_UP', '&mkp MB4', '&mmv MOVE_UP', '&mkp MB5', '&msc SCRL_UP']
  - ['', '', '', '', '', '&msc SCRL_DOWN', '&mmv MOVE_LEFT', '&mmv MOVE_DOWN', '&mmv MOVE_RIGHT', '&msc SCRL_DOWN']
  - ['', '', '', '', '', '', '&mkp LCLK', '&mkp MCLK', '&mkp RCLK', '']
  - - {t: Mouse, h: toggle}
    - ''
    - '&mkp LCLK'
    - '&mkp RCLK'
combos:
- p: [0, 1]
  k: ESC
- p: [10, 11]
  k: TAB
- p: [16, 17]
  k: RET
- p: [6, 7]
  k: BSPC
- p: [7, 8]
  k: DEL
- p: [13, 16]
  k: '&caps_word'
- p: [23, 24]
  k: {t: Mouse, h: toggle}
- p: [31, 32]
  k: Sft+LALT
